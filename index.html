<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Space & Science News</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#e9eef5;
      padding:30px;
    }

    .container{
      width:90%;
      max-width:1000px;
      margin:auto;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#222;
    }

    .search-box{
      display:flex;
      gap:10px;
      margin-bottom:25px;
    }

    input{
      flex:1;
      padding:12px;
      border:1px solid #ccc;
      border-radius:5px;
      outline:none;
      font-size:16px;
    }

    button{
      padding:12px 20px;
      border:none;
      background:black;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#333;
    }

    #defaultContent{
      background:white;
      padding:30px;
      border-radius:10px;
      text-align:center;
      margin-bottom:30px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    #defaultContent h2{
      margin-bottom:10px;
      color:#222;
    }

    #defaultContent p{
      color:#666;
      margin-bottom:20px;
    }

    .topics{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .topics span{
      background:#f2f2f2;
      padding:8px 15px;
      border-radius:20px;
      font-size:14px;
    }

    .news-container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
    }

    .card-content h2{
      font-size:20px;
      margin-bottom:10px;
      color:#222;
    }

    .card-content p{
      color:#555;
      margin-bottom:10px;
      line-height:1.5;
    }

    .card-content a{
      text-decoration:none;
      color:blue;
    }

    #message{
      text-align:center;
      margin-bottom:20px;
      color:red;
      font-size:18px;
    }

  </style>

</head>
<body>

  <div class="container">

    <h1>🚀 Space & Science News</h1>

    <div class="search-box">

      <input 
        type="text" 
        id="search" 
        placeholder="Search topics like NASA, SpaceX, Mars"
      >

      <button onclick="getNews()">
        Search
      </button>

    </div>

    <div id="message"></div>

    <div id="defaultContent">

      <h2>🌌 Welcome to Space News Hub</h2>

      <p>
        Search for the latest space, science and astronomy news updates.
      </p>

      <div class="topics">

        <span>NASA</span>
        <span>SpaceX</span>
        <span>Mars</span>
        <span>Moon</span>
        <span>Astronomy</span>

      </div>

    </div>

    <div class="news-container" id="newsContainer"></div>

  </div>

  <script>

    async function getNews(){

      let search = document.getElementById("search").value;

      let newsContainer = document.getElementById("newsContainer");

      let message = document.getElementById("message");

      let defaultContent = document.getElementById("defaultContent");

      newsContainer.innerHTML = "";

      message.innerHTML = "";

      if(search === ""){

        message.innerHTML = "Please enter a topic";

        return;
      }

      defaultContent.style.display = "none";

      let url = `https://api.spaceflightnewsapi.net/v4/articles/?search=${search}`;

      try{

        let response = await fetch(url);

        if(!response.ok){

          throw new Error("API not responding");

        }

        let data = await response.json();

        if(data.results.length === 0){

          message.innerHTML = "No news found";

          return;
        }

        data.results.slice(0,6).forEach(function(news){

          newsContainer.innerHTML += `

            <div class="card">

              <img 
                src="${news.image_url}"
              >

              <div class="card-content">

                <h2>${news.title}</h2>

                <p>
                  ${news.summary.slice(0,120)}...
                </p>

                <a href="${news.url}" target="_blank">
                  Read More
                </a>

              </div>

            </div>

          `;

        });

      }

      catch(error){

        message.innerHTML = "Error fetching news";

        console.log(error);

      }

    }

  </script>

</body>
</html>
